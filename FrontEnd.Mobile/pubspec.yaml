name: ashraak_mobile
description: Ashraak enterprise SaaS mobile client (Flutter foundation).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1
  logger: ^2.5.0
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  intl: ^0.19.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.1
  local_auth: ^2.3.0
  app_links: ^6.3.3
  flutter_local_notifications: ^18.0.1
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
