name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-audit:
    name: Package audit (CPM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify central package versions
        shell: pwsh
        run: ./scripts/package-audit.ps1

  backend:
    name: Backend restore, build, test
    runs-on: ubuntu-latest
    needs: package-audit
    defaults:
      run:
        working-directory: BackEnd
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: BackEnd/global.json

      - name: SDK info
        run: dotnet --info

      - name: Restore
        run: dotnet restore Ashraak.slnx

      - name: Build
        run: dotnet build Ashraak.slnx --no-restore -c Release

      - name: Test
        run: dotnet test Ashraak.slnx --no-build -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Build summary
        if: always()
        run: |
          echo "## Backend CI summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Restore | completed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build (Release) | completed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | completed |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "SDK: \`$(dotnet --version)\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: BackEnd/TestResults/**/*.trx
          if-no-files-found: ignore

  validate-docs:
    name: Documentation validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate documentation accompanies code changes
        env:
          DOC_VALIDATE_MODE: ${{ vars.DOC_VALIDATE_MODE || 'warn' }}
        run: |
          chmod +x scripts/validate-docs.sh
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="origin/main"
          fi
          ./scripts/validate-docs.sh "$BASE"

      - name: Docs validation summary
        if: always()
        run: |
          echo "## Documentation validation" >> "$GITHUB_STEP_SUMMARY"
          echo "Mode: \`${DOC_VALIDATE_MODE:-warn}\` (set repo variable \`DOC_VALIDATE_MODE=fail\` to enforce)." >> "$GITHUB_STEP_SUMMARY"
